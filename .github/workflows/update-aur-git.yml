name: Update AUR (git)

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.*'
      - 'src/**'
      - 'res/**'
      - 'icons/**'
      - 'PKGBUILD*'
      - '*.desktop'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aur-git
  cancel-in-progress: true

jobs:
  update-aur-git:
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      AUR_GIT: arch-install-manager-git
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed base-devel git openssh

      - name: Create non-root build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Stage PKGBUILD
        run: |
          install -d build
          cp -f PKGBUILD-git build/PKGBUILD
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          sed -i -E "s|^source=\(.*|source=(\"\$pkgname::git+${REPO_URL}#commit=${GITHUB_SHA}\")|" build/PKGBUILD
          printf '* text=auto eol=lf\n' > build/.gitattributes
          chown -R builder:builder build

      - name: Compute version from latest main
        working-directory: build
        run: |
          sudo -u builder makepkg -o --noprepare --nodeps --skipinteg --noconfirm

      - name: Generate .SRCINFO with computed pkgver
        working-directory: build
        run: |
          sudo -u builder makepkg --printsrcinfo > .SRCINFO

      - name: Setup SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          install -d -m 700 /home/builder/.ssh

          if printf '%s' "$AUR_SSH_PRIVATE_KEY" | grep -q 'BEGIN'; then
            printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > /home/builder/.ssh/aur_key
          elif printf '%s' "$AUR_SSH_PRIVATE_KEY" | base64 -d >/home/builder/.ssh/aur_key 2>/dev/null; then
            :
          else
            printf '%s' "$AUR_SSH_PRIVATE_KEY" | sed 's/\\n/\n/g' > /home/builder/.ssh/aur_key
          fi
          tr -d '\r' < /home/builder/.ssh/aur_key > /home/builder/.ssh/aur_key.clean
          mv /home/builder/.ssh/aur_key.clean /home/builder/.ssh/aur_key
          chmod 600 /home/builder/.ssh/aur_key

          ssh-keyscan -t ed25519,rsa aur.archlinux.org >> /home/builder/.ssh/known_hosts
          {
            echo "Host aur.archlinux.org"
            echo "  User aur"
            echo "  IdentitiesOnly yes"
            echo "  IdentityFile /home/builder/.ssh/aur_key"
            echo "  PubkeyAcceptedKeyTypes +ssh-ed25519,ssh-rsa"
          } > /home/builder/.ssh/config
          chown -R builder:builder /home/builder/.ssh

      - name: Clone or create AUR repository
        env:
          GIT_SSH_COMMAND: "ssh -F /home/builder/.ssh/config"
        run: |
          REPO="ssh://aur@aur.archlinux.org/${AUR_GIT}.git"
          if sudo -u builder GIT_SSH_COMMAND="$GIT_SSH_COMMAND" git clone "$REPO" aur-git; then
            echo "cloned existing $AUR_GIT"
          else
            echo "no AUR package $AUR_GIT yet, creating a new repository"
            rm -rf aur-git
            sudo -u builder git init -b master aur-git
            sudo -u builder git -C aur-git remote add origin "$REPO"
          fi

      - name: Write AUR metadata files
        run: |
          printf '* text=auto eol=lf\n' > aur-git/.gitattributes
          printf '%s\n' '*' '!PKGBUILD' '!.SRCINFO' '!.gitignore' > aur-git/.gitignore

      - name: Copy PKGBUILD and .SRCINFO into AUR repo
        run: |
          cp -f build/PKGBUILD aur-git/PKGBUILD
          cp -f build/.SRCINFO aur-git/.SRCINFO
          chown -R builder:builder aur-git

      - name: Commit and push to AUR (git)
        working-directory: aur-git
        env:
          GIT_SSH_COMMAND: "ssh -F /home/builder/.ssh/config"
          AUR_GIT_NAME: ${{ vars.AUR_GIT_NAME }}
          AUR_GIT_EMAIL: ${{ vars.AUR_GIT_EMAIL }}
        run: |
          sudo -u builder git config user.name "${AUR_GIT_NAME:-github-actions}"
          sudo -u builder git config user.email "${AUR_GIT_EMAIL}"
          sudo -u builder git add -f .gitattributes .gitignore PKGBUILD .SRCINFO
          if ! sudo -u builder git diff --cached --quiet; then
            PKGVER="$(sed -n 's/^\tpkgver = //p' .SRCINFO)"
            sudo -u builder git commit -m "Update to ${PKGVER}"
            sudo -u builder GIT_SSH_COMMAND="$GIT_SSH_COMMAND" git push origin HEAD:master
          else
            echo "No changes."
          fi
