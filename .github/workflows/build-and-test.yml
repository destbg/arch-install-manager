name: Build and Test

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed base-devel pkgconf rust gtk4 glib2 vte4 gtksourceview5 pacman-contrib

      - name: Build
        run: |
          cargo build --release --locked --all-features

      - name: Test
        run: |
          cargo test --release --locked --all-features
