name: Build and Update AUR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish when there is no release yet (for example 0.0.1)"
        required: false
        default: "0.0.1"

permissions:
  contents: write

jobs:
  build-and-update-aur:
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      AUR_SRC: arch-install-manager
      AUR_BIN: arch-install-manager-bin
      BINARIES: "daim daim-gui daim-helper daim-tray daim-check"
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed base-devel git openssh pacman-contrib pkgconf rust gtk4 glib2 vte4 gtksourceview5 github-cli

      - name: Create non-root build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Derive version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.event.inputs.version }}"
          fi
          VER="${TAG#refs/tags/}"; VER="${VER#v}"
          VER="${VER:-0.0.1}"
          echo "PKGVER=$VER" >> $GITHUB_ENV
          echo "GHTAG=${TAG:-$VER}" >> $GITHUB_ENV

      - name: Set crate version
        run: |
          sed -i -E "0,/^version = \".*\"/s//version = \"${PKGVER}\"/" Cargo.toml
          sed -i -E "/^name = \"arch-install-manager\"$/{n;s/^version = \".*\"$/version = \"${PKGVER}\"/}" Cargo.lock

      - name: Build release binaries
        run: |
          sudo -u builder bash -lc 'cargo build --release --locked'
          install -d dist
          for b in $BINARIES; do
            cp "target/release/$b" "dist/$b"
          done
          tar -C dist -czf "dist/${AUR_SRC}-${PKGVER}-x86_64.tar.gz" $BINARIES

      - name: Upload binary to release
        if: github.event_name == 'release'
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "$GHTAG" "dist/${AUR_SRC}-${PKGVER}-x86_64.tar.gz" \
            --clobber --repo "$GH_REPO"

      - name: Setup SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          install -d -m 700 /home/builder/.ssh

          if printf '%s' "$AUR_SSH_PRIVATE_KEY" | grep -q 'BEGIN'; then
            printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > /home/builder/.ssh/aur_key
          elif printf '%s' "$AUR_SSH_PRIVATE_KEY" | base64 -d >/home/builder/.ssh/aur_key 2>/dev/null; then
            :
          else
            printf '%s' "$AUR_SSH_PRIVATE_KEY" | sed 's/\\n/\n/g' > /home/builder/.ssh/aur_key
          fi
          tr -d '\r' < /home/builder/.ssh/aur_key > /home/builder/.ssh/aur_key.clean
          mv /home/builder/.ssh/aur_key.clean /home/builder/.ssh/aur_key
          chmod 600 /home/builder/.ssh/aur_key

          ssh-keyscan -t ed25519,rsa aur.archlinux.org >> /home/builder/.ssh/known_hosts
          {
            echo "Host aur.archlinux.org"
            echo "  User aur"
            echo "  IdentitiesOnly yes"
            echo "  IdentityFile /home/builder/.ssh/aur_key"
            echo "  PubkeyAcceptedKeyTypes +ssh-ed25519,ssh-rsa"
          } > /home/builder/.ssh/config
          chown -R builder:builder /home/builder/.ssh

      - name: Clone or create AUR repositories
        env:
          GIT_SSH_COMMAND: "ssh -F /home/builder/.ssh/config"
        run: |
          clone_or_init() {
            local name="$1" dir="$2"
            local repo="ssh://aur@aur.archlinux.org/${name}.git"
            if sudo -u builder GIT_SSH_COMMAND="$GIT_SSH_COMMAND" git clone "$repo" "$dir"; then
              echo "cloned existing $name"
            else
              echo "no AUR package $name yet, creating a new repository"
              rm -rf "$dir"
              sudo -u builder git init -b master "$dir"
              sudo -u builder git -C "$dir" remote add origin "$repo"
            fi
          }
          clone_or_init "$AUR_SRC" aur
          clone_or_init "$AUR_BIN" aur-bin

      - name: Write AUR metadata files
        run: |
          for dir in aur aur-bin; do
            printf '* text=auto eol=lf\n' > "$dir/.gitattributes"
            printf '%s\n' '*' '!PKGBUILD' '!.SRCINFO' '!.gitignore' > "$dir/.gitignore"
          done

      - name: Copy PKGBUILD into AUR repo
        run: |
          cp -f PKGBUILD aur/PKGBUILD
          cp -f PKGBUILD-bin aur-bin/PKGBUILD
          chown -R builder:builder aur aur-bin

      - name: Update pkgver and pkgrel
        run: |
          for dir in aur aur-bin; do
            sed -i -E "s/^pkgver=.*/pkgver=${PKGVER}/" "$dir/PKGBUILD"
            sed -i -E "s/^pkgrel=.*/pkgrel=1/" "$dir/PKGBUILD"
          done

      - name: Refresh checksums and .SRCINFO (non-root)
        run: |
          cd aur
          sudo -u builder bash -lc 'updpkgsums'
          sudo -u builder bash -lc 'makepkg --printsrcinfo > .SRCINFO'
          cd ..

          cd aur-bin
          sudo -u builder bash -lc 'updpkgsums'
          sudo -u builder bash -lc 'makepkg --printsrcinfo > .SRCINFO'

      - name: Commit and push to AUR
        working-directory: aur
        env:
          GIT_SSH_COMMAND: "ssh -F /home/builder/.ssh/config"
          AUR_GIT_NAME: ${{ vars.AUR_GIT_NAME }}
          AUR_GIT_EMAIL: ${{ vars.AUR_GIT_EMAIL }}
        run: |
          sudo -u builder git config user.name "${AUR_GIT_NAME:-github-actions}"
          sudo -u builder git config user.email "${AUR_GIT_EMAIL}"
          sudo -u builder git add -f .gitattributes .gitignore PKGBUILD .SRCINFO
          if ! sudo -u builder git diff --cached --quiet; then
            sudo -u builder git commit -m "Update to ${PKGVER} (pkgrel=1)"
            sudo -u builder GIT_SSH_COMMAND="$GIT_SSH_COMMAND" git push origin HEAD:master
          else
            echo "No changes."
          fi

      - name: Commit and push to AUR (bin)
        working-directory: aur-bin
        env:
          GIT_SSH_COMMAND: "ssh -F /home/builder/.ssh/config"
          AUR_GIT_NAME: ${{ vars.AUR_GIT_NAME }}
          AUR_GIT_EMAIL: ${{ vars.AUR_GIT_EMAIL }}
        run: |
          sudo -u builder git config user.name "${AUR_GIT_NAME:-github-actions}"
          sudo -u builder git config user.email "${AUR_GIT_EMAIL}"
          sudo -u builder git add -f .gitattributes .gitignore PKGBUILD .SRCINFO
          if ! sudo -u builder git diff --cached --quiet; then
            sudo -u builder git commit -m "Update to ${PKGVER} (pkgrel=1)"
            sudo -u builder GIT_SSH_COMMAND="$GIT_SSH_COMMAND" git push origin HEAD:master
          else
            echo "No changes."
          fi
